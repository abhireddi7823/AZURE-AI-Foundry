# ============================================================
# LRE Performance – Test Execution + AI Analysis
# ============================================================
# Triggers : manual (workflow_dispatch) OR push to main
#
# Required GitHub Secrets
# ──────────────────────────────────────────────────────────
#  LRE_API_KEY                      → LRE Basic auth key
#  AZURE_FOUNDRY_API_KEY            → Azure AI Foundry key
#  AZURE_FOUNDRY_DEPLOYMENT_PRIMARY    → e.g. gpt-4o
#  AZURE_FOUNDRY_DEPLOYMENT_SECONDARY  → e.g. gpt-4o-mini
#
# Required GitHub Variables
# ──────────────────────────────────────────────────────────
#  LRE_HOST             → https://lre.yourcompany.com
#  LRE_DOMAIN           → e.g. FS
#  LRE_PROJECT          → e.g. Payment_Initiation
#  LRE_TEST_ID          → e.g. 3079
#  LRE_TEST_INSTANCE_ID → e.g. 2270
#  LRE_TIMESLOT_MINUTES → e.g. 30
#  LRE_TREND_REPORT_ID  → e.g. 1109
# ============================================================

name: LRE Performance – Execution & AI Analysis

on:
  workflow_dispatch:
    inputs:
      test_id:
        description: 'LRE Test ID (overrides variable)'
        required: false
        default: ''
      test_instance_id:
        description: 'LRE Test Instance ID (overrides variable)'
        required: false
        default: ''
      timeslot_minutes:
        description: 'Timeslot duration in minutes'
        required: false
        default: '30'
      wait_seconds:
        description: 'Seconds to wait for test completion'
        required: false
        default: '400'

  push:
    branches:
      - main          # ← change if needed

# ============================================================
jobs:
  LRE_Execution_And_Analysis:
    name: Run LRE Test + Analyse Results
    runs-on: ['self-hosted', 'linux']

    env:
      LRE_HOST:      ${{ vars.LRE_HOST }}
      LRE_DOMAIN:    ${{ vars.LRE_DOMAIN }}
      LRE_PROJECT:   ${{ vars.LRE_PROJECT }}
      TEST_ID:       ${{ github.event.inputs.test_id          || vars.LRE_TEST_ID }}
      INSTANCE_ID:   ${{ github.event.inputs.test_instance_id || vars.LRE_TEST_INSTANCE_ID }}
      TIMESLOT_MINS: ${{ github.event.inputs.timeslot_minutes || vars.LRE_TIMESLOT_MINUTES || '30' }}
      WAIT_SECS:     ${{ github.event.inputs.wait_seconds     || '400' }}
      TREND_ID:      ${{ vars.LRE_TREND_REPORT_ID }}

    steps:

      # ── 1. Checkout (needed to run scripts/) ─────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ───────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ── 4. Trigger LRE test run ───────────────────────────
      - name: Trigger test in LRE
        id: trigger_test
        run: |
          echo "▶  Authenticating with LRE..."
          curl -k -s -c cookies.txt \
            -H "Authorization: Basic ${{ secrets.LRE_API_KEY }}" \
            "${LRE_HOST}/loadtest/rest/authentication-point/authenticate"

          echo "▶  Creating site session..."
          curl -k -s -b cookies.txt \
            -H "Content-Type: application/xml" \
            "${LRE_HOST}/loadtest/rest/site-session"

          echo "▶  Triggering test (TestID=${TEST_ID}, InstanceID=${INSTANCE_ID})..."
          curl -k -s -b cookies.txt \
            -H "Accept: application/xml" \
            -H "Content-Type: application/xml" \
            -d "<Run xmlns=\"http://www.hp.com/PC/REST/API\">
                  <PostRunAction>Collate And Analyze</PostRunAction>
                  <TestID>${TEST_ID}</TestID>
                  <TestInstanceID>${INSTANCE_ID}</TestInstanceID>
                  <TimeslotDuration>
                    <Hours>0</Hours>
                    <Minutes>${TIMESLOT_MINS}</Minutes>
                  </TimeslotDuration>
                  <VudsMode>false</VudsMode>
                </Run>" \
            "${LRE_HOST}/loadtest/rest/domains/${LRE_DOMAIN}/projects/${LRE_PROJECT}/Runs" \
            -o package.xml

          echo "▶  Trigger response:"
          cat package.xml

      # ── 5. Extract Run ID ─────────────────────────────────
      - name: Extract Run ID
        id: get_run_id
        uses: mavrosxristoforos/get-xml-info@2.0
        with:
          xml-file: 'package.xml'
          xpath: '//*[local-name()="Run"]/*[local-name()="ID"]'

      - name: Validate Run ID
        run: |
          echo "✅  Run ID = ${{ steps.get_run_id.outputs.info }}"
          if [ -z "${{ steps.get_run_id.outputs.info }}" ]; then
            echo "❌  Run ID is empty – check package.xml above."
            exit 1
          fi

      # ── 6. Wait for test completion ───────────────────────
      - name: Wait for test to complete
        run: |
          echo "⏳  Waiting ${WAIT_SECS}s for test to finish..."
          sleep "${WAIT_SECS}s"

      # ── 7. Fetch SLA status ───────────────────────────────
      - name: Fetch SLA status
        run: |
          curl -k -s -c cookies.txt \
            -H "Authorization: Basic ${{ secrets.LRE_API_KEY }}" \
            -H "Accept: application/xml" \
            "${LRE_HOST}/loadtest/rest/authentication-point/authenticate"

          curl -k -s -b cookies.txt \
            -H "Accept: application/xml" \
            -H "Content-Type: application/xml" \
            "${LRE_HOST}/loadtest/rest/domains/${LRE_DOMAIN}/projects/${LRE_PROJECT}/Runs/${{ steps.get_run_id.outputs.info }}" \
            -o SLA.xml

          echo "▶  SLA response:"
          cat SLA.xml

      - name: Extract SLA status
        id: get_sla
        uses: mavrosxristoforos/get-xml-info@2.0
        with:
          xml-file: 'SLA.xml'
          xpath: '//*[local-name()="Run"]/*[local-name()="RunSLAStatus"]'

      - name: Confirm SLA status
        run: echo "📊  SLA Status = ${{ steps.get_sla.outputs.info }}"

      # ── 8. Brief pause before results ────────────────────
      - name: Sleep before fetching results
        run: sleep 10s

      # ── 9. Fetch Results XML ──────────────────────────────
      - name: Fetch Results XML
        run: |
          curl -k -s -c cookies.txt \
            -H "Authorization: Basic ${{ secrets.LRE_API_KEY }}" \
            -H "Accept: application/xml" \
            "${LRE_HOST}/loadtest/rest/authentication-point/authenticate"

          curl -k -s -b cookies.txt \
            -H "Accept: application/xml" \
            -H "Content-Type: application/xml" \
            "${LRE_HOST}/loadtest/rest/domains/${LRE_DOMAIN}/projects/${LRE_PROJECT}/Runs/${{ steps.get_run_id.outputs.info }}/Results" \
            -o Results.xml

          echo "▶  Results:"
          cat Results.xml

      # ── 10. Extract HTML Report ID (XPath + fallback) ─────
      - name: Extract HTML Report ID (XPath primary)
        id: get_html_id_xpath
        uses: mavrosxristoforos/get-xml-info@2.0
        with:
          xml-file: 'Results.xml'
          xpath: '//*[local-name()="RunResult"][*[local-name()="Type" and text()="HTML REPORT"]]/*[local-name()="ID"]'

      - name: Extract all Result IDs (fallback)
        id: get_all_ids
        if: steps.get_html_id_xpath.outputs.info == ''
        uses: mavrosxristoforos/get-xml-info@2.0
        with:
          xml-file: 'Results.xml'
          xpath: '//*[local-name()="RunResult"]/*[local-name()="ID"]'

      - name: Split fallback IDs
        id: split_ids
        if: steps.get_html_id_xpath.outputs.info == ''
        uses: winterjung/split@v2
        with:
          msg: '${{ steps.get_all_ids.outputs.info }}'
          separator: ','

      - name: Resolve final HTML Report ID
        id: html_result_id
        run: |
          XPATH_ID="${{ steps.get_html_id_xpath.outputs.info }}"
          SPLIT_ID="${{ steps.split_ids.outputs._3 }}"
          if [ -n "$XPATH_ID" ]; then
            echo "html_id=${XPATH_ID}" >> $GITHUB_OUTPUT
            echo "✅  HTML ID (XPath) = ${XPATH_ID}"
          elif [ -n "$SPLIT_ID" ]; then
            echo "html_id=${SPLIT_ID}" >> $GITHUB_OUTPUT
            echo "⚠️  HTML ID (fallback) = ${SPLIT_ID}"
          else
            echo "❌  Could not determine HTML Report ID."
            exit 1
          fi

      # ── 11. Download HTML Report ──────────────────────────
      - name: Download HTML Report
        run: |
          curl -k -s -c cookies.txt \
            -H "Authorization: Basic ${{ secrets.LRE_API_KEY }}" \
            -H "Accept: application/xml" \
            "${LRE_HOST}/loadtest/rest/authentication-point/authenticate"

          curl -k -s -b cookies.txt \
            -H "Accept: */*" \
            -H "Accept-Encoding: gzip, deflate, br" \
            -H "CURLOPT_ENCODING: gzip" \
            -H "Content-Type: application/zip" \
            -H "Authorization: Basic ${{ secrets.LRE_API_KEY }}" \
            "${LRE_HOST}/loadtest/rest/domains/${LRE_DOMAIN}/projects/${LRE_PROJECT}/Runs/${{ steps.get_run_id.outputs.info }}/Results/${{ steps.html_result_id.outputs.html_id }}/data" \
            -o HTML_Report.zip

      - name: Unzip HTML Report
        run: |
          mkdir -p reports/html
          unzip -o HTML_Report.zip -d reports/html || echo "⚠️  Unzip failed or already extracted."
          ls -lrt reports/html/

      # ── 12. Download Trend Report ─────────────────────────
      - name: Download Trend Report
        run: |
          curl -k -s -c cookies.txt \
            -H "Authorization: Basic ${{ secrets.LRE_API_KEY }}" \
            -H "Accept: application/xml" \
            "${LRE_HOST}/loadtest/rest/authentication-point/authenticate"

          curl -k -s -b cookies.txt \
            -H "Accept: */*" \
            -H "Accept-Encoding: gzip, deflate, br" \
            -H "CURLOPT_ENCODING: gzip" \
            -H "Content-Type: application/zip" \
            -H "Authorization: Basic ${{ secrets.LRE_API_KEY }}" \
            "${LRE_HOST}/loadtest/rest/domains/${LRE_DOMAIN}/projects/${LRE_PROJECT}/TrendReports/${TREND_ID}/data" \
            -o Trend_Report.zip

      - name: Unzip Trend Report
        run: |
          mkdir -p reports/trend
          unzip -o Trend_Report.zip -d reports/trend || echo "⚠️  Unzip failed – may already be HTML/PDF."
          ls -lrt reports/trend/

      # ── 13. Run AI analysis ───────────────────────────────
      - name: Run AI analysis with Azure AI Foundry
        id: ai_analysis
        env:
          AZURE_FOUNDRY_API_KEY:    ${{ secrets.AZURE_FOUNDRY_API_KEY }}
          PRIMARY_DEPLOYMENT:       ${{ secrets.AZURE_FOUNDRY_DEPLOYMENT_PRIMARY }}
          SECONDARY_DEPLOYMENT:     ${{ secrets.AZURE_FOUNDRY_DEPLOYMENT_SECONDARY }}
          SLA_STATUS:               ${{ steps.get_sla.outputs.info }}
          RUN_ID:                   ${{ steps.get_run_id.outputs.info }}
          HTML_REPORT_DIR:          reports/html
          TREND_REPORT_DIR:         reports/trend
          GITHUB_RUN_NUMBER:        ${{ github.run_number }}
        run: python scripts/analyse_reports.py

      # ── 14. Print analysis in logs ────────────────────────
      - name: Print analysis to logs
        run: |
          echo "=================================================="
          echo "📊  LRE PERFORMANCE ANALYSIS"
          echo "=================================================="
          cat analysis_output/summary.md
          echo "=================================================="

      # ── 15. Write analysis to GitHub Job Summary ──────────
      - name: Write analysis to GitHub Job Summary
        run: |
          echo "## 📊 LRE Performance Analysis – Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| LRE Run ID | \`${{ steps.get_run_id.outputs.info }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SLA Status | ${{ steps.get_sla.outputs.info }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test ID | \`${TEST_ID}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Project | \`${LRE_PROJECT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat analysis_output/summary.md >> $GITHUB_STEP_SUMMARY

      # ── 16. Upload all artefacts ──────────────────────────
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HTMLReport-${{ github.run_number }}
          path: HTML_Report.zip

      - name: Upload Trend Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TrendReport-${{ github.run_number }}
          path: Trend_Report.zip

      - name: Upload AI Analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AI-Analysis-${{ github.run_number }}
          path: analysis_output/
          retention-days: 30

      - name: Upload raw LRE XMLs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LRE-XMLs-${{ github.run_number }}
          path: |
            package.xml
            SLA.xml
            Results.xml
          retention-days: 14
