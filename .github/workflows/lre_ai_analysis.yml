name: LRE AI Analysis

on:
  workflow_dispatch:

jobs:
  analyse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Analysis Script
        run: |
          python scripts/analyse_reports.py

      - name: Publish Summary
        run: |
          cat analysis_output/summary.md >> $GITHUB_STEP_SUMMARY
