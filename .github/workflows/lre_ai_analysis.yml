name: LRE Authentication Test

on:
  workflow_dispatch:

jobs:
  lre-auth:
    runs-on: [ 'self-hosted', 'linux' ]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to LRE
        run: |
          curl -k -v \
          -c cookies.txt \
          -H "Authorization: Basic ${{ secrets.LRE_API_KEY }}" \
          "https://lre.edb.com/loadtest/rest/authentication-point/authenticate"

      - name: Create Site Session
        run: |
          curl -k -v \
          -b cookies.txt \
          -H "Content-Type: application/xml" \
          "https://lre.edb.com/loadtest/rest/site-session"

      - name: Get Domains
        run: |
          curl -k -v \
          -b cookies.txt \
          -H "Accept: application/xml" \
          "https://lre.edb.com/loadtest/rest/domains" \
          -o domains.xml

      - name: Display Domains Response
        run: |
          echo "===== DOMAINS.XML ====="
          cat domains.xml

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lre-auth-results
          path: |
            cookies.txt
            domains.xml
