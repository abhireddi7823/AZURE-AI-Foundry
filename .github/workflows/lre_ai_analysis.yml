name: LRE AI Analysis

on:
  workflow_dispatch:

jobs:
  analyse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Connectivity Test
        env:
          AZURE_FOUNDRY_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY }}
          AZURE_FOUNDRY_ENDPOINT: ${{ secrets.AZURE_FOUNDRY_ENDPOINT }}
          AZURE_FOUNDRY_DEPLOYMENT: ${{ secrets.AZURE_FOUNDRY_DEPLOYMENT_PRIMARY }}

          LRE_API_KEY: ${{ secrets.LRE_API_KEY }}
          LRE_HOST: https://lre.edb.com

        run: |
          python scripts/analyse_reports.py

      - name: Publish Summary
        run: |
          cat analysis_output/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Analysis
        uses: actions/upload-artifact@v4
        with:
          name: Connectivity-Test
          path: analysis_output/
